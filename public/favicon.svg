<svg class="logo-svg" xmlns="http://www.w3.org/2000/svg" viewBox="40 50 420 420">
    <defs>
        <!-- Gradiente del Planeta Plutón -->
        <linearGradient id="planetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#9E9E9E" />
            <stop offset="50%" stop-color="#616161" />
            <stop offset="100%" stop-color="#212121" />
        </linearGradient>

        <!-- Gradiente del Corazón (Tombaugh Regio) -->
        <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#F5F5F5" stop-opacity="0.9"/>
            <stop offset="100%" stop-color="#9E9E9E" stop-opacity="0.4"/>
        </linearGradient>

        <!-- Gradiente Neon para el Sobre / Datos -->
        <linearGradient id="mailGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00E5FF" />
            <stop offset="100%" stop-color="#2979FF" />
        </linearGradient>

        <!-- Filtro de Resplandor Neon -->
        <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="6" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>

        <!-- ClipPaths para crear el efecto 3D de la órbita (detrás y delante) -->
        <clipPath id="backHalf">
            <rect x="0" y="-100" width="500" height="350" transform="rotate(-20 250 250)" />
        </clipPath>
        <clipPath id="frontHalf">
            <rect x="0" y="250" width="500" height="350" transform="rotate(-20 250 250)" />
        </clipPath>
    </defs>

    <!-- Estrellas / Espacio de fondo sutil -->
    <circle cx="120" cy="150" r="2.5" fill="#00E5FF" opacity="0.6"/>
    <circle cx="380" cy="120" r="1.5" fill="#E1BEE7" opacity="0.4"/>
    <circle cx="150" cy="380" r="3" fill="#2979FF" opacity="0.5"/>
    <circle cx="400" cy="400" r="2" fill="#8E24AA" opacity="0.4"/>

    <!-- Órbita Trasera (Pasa por detrás del planeta) -->
    <ellipse cx="250" cy="250" rx="190" ry="75" fill="none" stroke="#2979FF" stroke-width="2" stroke-dasharray="6 12" transform="rotate(-20 250 250)" opacity="0.3" clip-path="url(#backHalf)" />

    <!-- PLANETA PLUTÓN -->
    <g id="Pluto">
        <!-- Base del planeta -->
        <circle cx="250" cy="250" r="100" fill="url(#planetGrad)" />
        
        <!-- Atmósfera / Resplandor exterior sutil -->
        <circle cx="250" cy="250" r="102" fill="none" stroke="#9E9E9E" stroke-width="1.5" opacity="0.5" />

        <!-- Corazón de Plutón (Tombaugh Regio estilizado) -->
        <path d="M 250 290
                 C 205 240, 185 215, 205 190
                 C 215 175, 240 180, 250 205
                 C 260 180, 285 175, 295 190
                 C 315 215, 295 240, 250 290 Z"
              fill="url(#heartGrad)" transform="rotate(12 250 250)" />

        <!-- Cráteres minimalistas -->
        <circle cx="200" cy="210" r="14" fill="#000000" opacity="0.3" />
        <circle cx="290" cy="260" r="8" fill="#000000" opacity="0.25" />
        <circle cx="195" cy="280" r="22" fill="#000000" opacity="0.2" />
        
        <!-- Sombra interior para darle volumen (Efecto eclipse 3D) -->
        <path d="M 150 250 A 100 100 0 0 0 350 250 A 90 90 0 0 1 150 250 Z" fill="#000000" opacity="0.35" />
    </g>

    <!-- Órbita Delantera (Pasa por delante del planeta) -->
    <ellipse cx="250" cy="250" rx="190" ry="75" fill="none" stroke="#00E5FF" stroke-width="3" stroke-dasharray="6 12" transform="rotate(-20 250 250)" opacity="0.8" clip-path="url(#frontHalf)" />

    <!-- SOBRE DE CORREO ORBITANDO (Representa el Mail Temporal) -->
    <!-- Ubicado en el trayecto de la órbita inferior derecha -->
    <g transform="translate(370, 290) rotate(-15)">
        
        <!-- Rastro de datos desintegrándose (El concepto "Temporal") -->
        <g opacity="0.9">
            <rect x="45" y="-12" width="8" height="8" rx="2" fill="#00E5FF" opacity="0.8" />
            <rect x="62" y="2" width="5" height="5" rx="1" fill="#2979FF" opacity="0.6" />
            <rect x="50" y="14" width="6" height="6" rx="1.5" fill="#00E5FF" opacity="0.7" />
            <rect x="75" y="-6" width="4" height="4" rx="1" fill="#2979FF" opacity="0.4" />
            <rect x="85" y="8" width="3" height="3" rx="0.5" fill="#00E5FF" opacity="0.3" />
        </g>

        <!-- Icono del Sobre -->
        <g filter="url(#neonGlow)">
            <!-- Base oscura del sobre para contraste -->
            <rect x="-38" y="-25" width="76" height="50" rx="6" fill="#0f111a" stroke="url(#mailGrad)" stroke-width="3.5" />
            
            <!-- Solapa superior del sobre -->
            <path d="M -38 -25 L 0 5 L 38 -25" fill="none" stroke="url(#mailGrad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
            
            <!-- Líneas inferiores del sobre -->
            <path d="M -38 25 L -10 2 M 38 25 L 10 2" fill="none" stroke="url(#mailGrad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
        </g>
    </g>
</svg>
